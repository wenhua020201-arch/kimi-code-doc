apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimi-coding-docs
  namespace: agent
  labels:
    app: kimi-coding-docs
  annotations:
    description: "Kimi Coding Documentation"
spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: kimi-coding-docs
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: kimi-coding-docs
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - image: msai-cn-beijing.cr.volces.com/agent/kimi-coding-docs:09b8bad
        name: main
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          limits:
            cpu: "2"
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 512Mi
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
            scheme: HTTP
          periodSeconds: 60
          successThreshold: 1
          timeoutSeconds: 30
          initialDelaySeconds: 30
