apiVersion: v1
kind: Service
metadata:
  name: kimi-coding-docs
  namespace: agent
  labels:
    app: kimi-coding-docs
  annotations:
    description: "Kimi Coding Documentation"
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: kimi-coding-docs
  type: ClusterIP
  sessionAffinity: ClientIP
